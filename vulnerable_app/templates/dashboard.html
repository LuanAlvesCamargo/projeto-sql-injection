<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav>

        <h2>Library Dashboard</h2>

        <div>

            <span>
                User: {{ username }}
            </span>

            <a href="/books">
                Books
            </a>

            <a href="/logout">
                Logout
            </a>

        </div>

    </nav>

    <div class="container">

        <div class="cards">

            <div class="card">

                <h3>Total Books</h3>

                <p>{{ total_books }}</p>

            </div>

            <div class="card">

                <h3>User Role</h3>

                <p>{{ role }}</p>

            </div>

            <div class="card">

                <h3>Logged User</h3>

                <p>{{ username }}</p>

            </div>

        </div>

    </div>

</body>

</html>
